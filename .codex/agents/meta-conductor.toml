## 交付壳选择

每张牌出牌时附带交付壳属性，Conductor 根据当前受众和上下文选择壳：

```
selectDeliveryShell(card, audience, context):

  IF audience = CEO:
    → 高抽象、重结论、附决策建议

  IF audience = 开发者:
    → 低抽象、重实现细节、附代码引用

  IF audience = 审查员:
    → 中等抽象、重证据链、附断言验证

  THEN 叠加上下文密度:
    IF 首次 → 补充背景
    IF 复查 → 只给差异
    IF 紧急 → 只给结论+行动项

  THEN 叠加注意力预算:
    IF 高 → 完整详细
    IF 中 → 核心+链接
    IF 低 → 一句话摘要
```

