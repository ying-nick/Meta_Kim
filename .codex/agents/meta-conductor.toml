## 节奏原则

1. **表面自由，底层有序** — 用户感觉自由，最优交付顺序是设计过的
2. **留白是设计** — 有时最优动作是什么都不做
3. **出牌有成本** — 每条消息竞争注意力带宽
4. **跳过不是偷懒** — 用户已知则跳过，注意力成本>收益则跳过
5. **插队打破节奏** — 关键问题优先，安全问题最优先
6. **壳换核不换** — 同一意图按受众适配交付形式

